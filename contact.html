  <main class="main-content">
    <h1 class="page-title">Contact Me</h1>
    <p class="page-subtitle">Please feel free to contact me anytime!</p>
    <hr class="divider">

    <div class="card">
      <form class="contact-form" action="#" method="post">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Message</button>
      </form>
    </div>

    <div class="card contact-info">
      <h3 style="color: #1a2f3f; margin-bottom: 12px;">More ways to reach me</h3>
      <p>📧 aagam.karki@kavyaschool.edu.np</p>
      <p>📱 +977 (985) 123-4567</p>
      <div class="social-links">
        <a href="https://github.com/aagamkarkee">GitHub</a>
        <a href="https://www.linkedin.com">LinkedIn</a>
        <a href="https://x.com">Twitter</a>
      </div>
    </div>
